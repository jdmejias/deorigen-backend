services:
  postgres:
    image: postgres:16
    container_name: deorigen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deorigen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - deorigen_pgdata:/var/lib/postgresql/data

volumes:
  deorigen_pgdata: